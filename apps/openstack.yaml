# Wave 6: Keystone - OpenStack Identity Service
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-keystone
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/osm1n/homelab-setup
    targetRevision: main
    path: infrastructure/openstack/keystone
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  # Ignore differences for secrets and jobs that are populated/managed externally
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: keystone-fernet-keys
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: keystone-credential-keys
      jsonPointers:
        - /data
    - group: batch
      kind: Job
      name: keystone-fernet-setup
      jsonPointers:
        - /spec/template/metadata/labels
        - /metadata/labels
    - group: batch
      kind: Job
      name: keystone-credential-setup
      jsonPointers:
        - /spec/template/metadata/labels
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
