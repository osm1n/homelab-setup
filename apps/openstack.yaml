# OpenStack Infrastructure and Services
# Deployed via ArgoCD with sync waves for dependency ordering
---
# Wave 5: OpenStack Namespace Config
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/osm1n/homelab-setup
    targetRevision: main
    path: infrastructure/openstack
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
