nova:
  # Disable Helm hooks - Jobs run as regular resources for ArgoCD compatibility
  helm3_hook: false

  # Override images to use available ones
  images:
    tags:
      # Use airshipit nova image for assets (kolla image is unavailable)
      nova_novncproxy_assets: quay.io/airshipit/nova:2025.1-ubuntu_noble

  # Libvirt configuration for compute nodes - use host libvirt
  conf:
    # Enable Ceph RBD for ephemeral disks
    ceph:
      enabled: true
      cinder:
        user: nova
        keyring: <your-ceph-nova-keyring>
        secret_uuid: "457eb676-33da-42ec-9a8c-9293d545c337"
    libvirt:
      listen_type: none
      # Connect to host's libvirt socket
      connection_uri: "qemu:///system"
      virt_type: kvm
      cpu_mode: host-model
      # Route ephemeral disks to Ceph RBD (vms pool)
      images_type: rbd
      images_rbd_pool: vms
      images_rbd_ceph_conf: /etc/ceph/ceph.conf
      rbd_user: nova
      rbd_secret_uuid: "457eb676-33da-42ec-9a8c-9293d545c337"
    # Override logging to expose oslo_service errors (root logger was null, hiding crashes)
    logging:
      loggers:
        keys:
          - root
          - nova
          - os.brick
      handlers:
        keys:
          - stdout
          - stderr
          - "null"
      formatters:
        keys:
          - context
          - default
      logger_root:
        level: WARNING
        handlers:
          - stdout
      logger_nova:
        level: INFO
        handlers:
          - stdout
        qualname: nova
      logger_os.brick:
        level: INFO
        handlers:
          - stdout
        qualname: os.brick
      handler_null:
        class: logging.NullHandler
        formatter: default
        args: ()
      handler_stdout:
        class: StreamHandler
        args: (sys.stdout,)
        formatter: context
      handler_stderr:
        class: StreamHandler
        args: (sys.stderr,)
        formatter: context
      formatter_context:
        class: oslo_log.formatters.ContextFormatter
        datefmt: "%Y-%m-%d %H:%M:%S"
      formatter_default:
        format: "%(message)s"
        datefmt: "%Y-%m-%d %H:%M:%S"
    nova:
      workarounds:
        skip_cpu_compare_on_dest: true
      libvirt:
        virt_type: kvm
        cpu_mode: host-model
        connection_uri: "qemu:///system"
        images_type: rbd
        images_rbd_pool: vms
        images_rbd_ceph_conf: /etc/ceph/ceph.conf
        rbd_user: nova
        rbd_secret_uuid: "457eb676-33da-42ec-9a8c-9293d545c337"
        # Live migration settings
        live_migration_scheme: "tcp"
        live_migration_permit_auto_converge: true
        live_migration_permit_post_copy: false
      placement:
        auth_type: password
        auth_url: http://keystone-api.openstack.svc.cluster.local:5000/v3
        auth_version: v3
        region_name: RegionOne
        project_name: service
        project_domain_name: service
        user_domain_name: service
        username: placement
        password: <your-placement-keystone-password>
        valid_interfaces: internal
        endpoint_override: http://placement-api.openstack.svc.cluster.local:8778
      neutron:
        auth_type: password
        auth_url: http://keystone-api.openstack.svc.cluster.local:5000/v3
        auth_version: v3
        region_name: RegionOne
        project_name: service
        project_domain_name: service
        user_domain_name: service
        username: neutron
        password: <your-neutron-keystone-password>
        valid_interfaces: internal
        metadata_proxy_shared_secret: <your-metadata-shared-secret>
        service_metadata_proxy: true
      glance:
        valid_interfaces: internal
        api_servers: http://glance-api.openstack.svc.cluster.local:9292

  # Node selectors - compute only on labeled Ubuntu nodes with libvirt
  labels:
    agent:
      compute:
        node_selector_key: openstack-nova-compute
        node_selector_value: enabled
    api_metadata:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    conductor:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    job:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    novncproxy:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    osapi:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    scheduler:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    test:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux

  # Endpoints configuration
  endpoints:
    identity:
      auth:
        admin:
          region_name: RegionOne
          username: admin
          password: <your-openstack-admin-password>
          project_name: admin
          user_domain_name: default
          project_domain_name: default
        nova:
          role: admin,service
          region_name: RegionOne
          username: nova
          password: <your-nova-keystone-password>
          project_name: service
          user_domain_name: service
          project_domain_name: service
        service:
          role: admin,service
          region_name: RegionOne
          username: nova_service_user
          password: <your-nova-service-user-password>
          project_name: service
          user_domain_name: service
          project_domain_name: service
        neutron:
          role: admin,service
          region_name: RegionOne
          project_name: service
          user_domain_name: service
          project_domain_name: service
          username: neutron
          password: <your-neutron-keystone-password>
        placement:
          role: admin,service
          region_name: RegionOne
          username: placement
          password: <your-placement-keystone-password>
          project_name: service
          user_domain_name: service
          project_domain_name: service
        cinder:
          role: admin,service
          region_name: RegionOne
          username: cinder
          password: <your-cinder-keystone-password>
          project_name: service
          user_domain_name: service
          project_domain_name: service
      hosts:
        default: keystone
        internal: keystone-api
      host_fqdn_override:
        default: null
      path:
        default: /v3
      scheme:
        default: http
      port:
        api:
          default: 80
          internal: 5000
    compute:
      hosts:
        default: nova
        internal: nova-api
      host_fqdn_override:
        default: null
      path:
        default: /v2.1
      scheme:
        default: http
      port:
        api:
          default: 8774
          internal: 8774
    compute_metadata:
      hosts:
        default: nova-metadata
        internal: nova-metadata
      host_fqdn_override:
        default: null
      path:
        default: /
      scheme:
        default: http
      port:
        metadata:
          default: 8775
          internal: 8775
    compute_novnc_proxy:
      hosts:
        default: nova-novncproxy
        internal: nova-novncproxy
      host_fqdn_override:
        default: null
      path:
        default: /vnc_auto.html
      scheme:
        default: http
      port:
        novnc_proxy:
          default: 6080
          internal: 6080
    placement:
      hosts:
        default: placement
        internal: placement-api
      host_fqdn_override:
        default: null
      path:
        default: /
      scheme:
        default: http
      port:
        api:
          default: 8778
          internal: 8778
    image:
      hosts:
        default: glance
        internal: glance-api
      host_fqdn_override:
        default: null
      path:
        default: /v2
      scheme:
        default: http
      port:
        api:
          default: 9292
          internal: 9292
    network:
      hosts:
        default: neutron
        internal: neutron-server
      host_fqdn_override:
        default: null
      path:
        default: null
      scheme:
        default: http
      port:
        api:
          default: 9696
          internal: 9696
    oslo_db:
      auth:
        admin:
          username: root
          password: <your-mariadb-root-password>
        nova:
          username: nova
          password: <your-nova-db-password>
      hosts:
        default: openstack-mariadb
      path: /nova
      scheme: mysql+pymysql
      port:
        mysql:
          default: 3306
    oslo_db_api:
      auth:
        admin:
          username: root
          password: <your-mariadb-root-password>
        nova:
          username: nova
          password: <your-nova-db-password>
      hosts:
        default: openstack-mariadb
      path: /nova_api
      scheme: mysql+pymysql
      port:
        mysql:
          default: 3306
    oslo_db_cell0:
      auth:
        admin:
          username: root
          password: <your-mariadb-root-password>
        nova:
          username: nova
          password: <your-nova-db-password>
      hosts:
        default: openstack-mariadb
      path: /nova_cell0
      scheme: mysql+pymysql
      port:
        mysql:
          default: 3306
    oslo_cache:
      hosts:
        default: openstack-memcached
      port:
        memcache:
          default: 11211
    oslo_messaging:
      auth:
        admin:
          username: openstack
          password: <your-rabbitmq-password>
        nova:
          username: openstack
          password: <your-rabbitmq-password>
      hosts:
        default: openstack-rabbitmq
      host_fqdn_override:
        default: openstack-rabbitmq.openstack.svc.cluster.local
      port:
        amqp:
          default: 5672
      statefulset: null

  # Ingress configuration - use nginx ingress class
  network:
    osapi:
      ingress:
        public: true
        classes:
          namespace: "nginx"
          cluster: "nginx"
    novncproxy:
      ingress:
        public: true
        classes:
          namespace: "nginx"
          cluster: "nginx"
    metadata:
      ingress:
        public: true
        classes:
          namespace: "nginx"
          cluster: "nginx"

  # Pod configuration
  pod:
    replicas:
      api_metadata: 1
      osapi: 1
      conductor: 1
      scheduler: 1
      novncproxy: 1
    resources:
      api_metadata:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
      osapi:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
      conductor:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
      scheduler:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"

  # Bootstrap configuration - create default flavors
  bootstrap:
    enabled: true
    ks_user: admin
    structured:
      flavors:
        enabled: true
        options:
          m1_tiny:
            name: "m1.tiny"
            ram: 512
            disk: 1
            vcpus: 1
          m1_small:
            name: "m1.small"
            ram: 2048
            disk: 20
            vcpus: 1
          m1_medium:
            name: "m1.medium"
            ram: 4096
            disk: 40
            vcpus: 2

  # Override dependencies to remove rabbit-init from all components
  dependencies:
    static:
      api:
        jobs:
          - nova-db-sync
          - nova-ks-user
          - nova-ks-endpoints
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: identity
      api_metadata:
        jobs:
          - nova-db-sync
          - nova-ks-user
          - nova-ks-endpoints
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: identity
          - endpoint: internal
            service: oslo_messaging
      bootstrap:
        jobs:
          - nova-db-sync
          - nova-ks-user
          - nova-ks-endpoints
        services:
          - endpoint: internal
            service: identity
      cell_setup:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: oslo_messaging
      conductor:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: oslo_messaging
      novncproxy:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: oslo_messaging
      scheduler:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: oslo_messaging
      service_cleaner:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_messaging
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: identity
          - endpoint: internal
            service: compute
      storage_init:
        services: null
      compute:
        jobs:
          - nova-db-sync
        services:
          - endpoint: internal
            service: oslo_messaging
        # No pod dependencies - using host libvirt
        pod: null

  # Ceph RBD integration - ephemeral disks in vms pool
  ceph_client:
    configmap: ceph-etc
    user_secret_name: nova-rbd-keyring

  # Disable features not needed for homelab
  manifests:
    pod_rally_test: false
    job_image_repo_sync: false
    job_rabbit_init: false
    deployment_serialproxy: false
    deployment_spiceproxy: false
    service_serialproxy: false
    service_spiceproxy: false
    ingress_serialproxy: false
    ingress_spiceproxy: false
    service_ingress_serialproxy: false
    service_ingress_spiceproxy: false
    # Enable compute on Ubuntu nodes with libvirt
    daemonset_compute: true
    # Disable storage-init - Ceph pools created manually
    job_storage_init: false
    # Enable cell setup
    job_cell_setup: true
    cron_job_cell_setup: true
    cron_job_service_cleaner: true
    # Disable Ceph-related configmaps/secrets for compute
    configmap_etc: true
    secret_keystone: true
