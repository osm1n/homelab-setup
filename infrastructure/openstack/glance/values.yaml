glance:
  # Disable Helm hooks - Jobs run as regular resources for ArgoCD compatibility
  helm3_hook: false

  # Use local filesystem storage for images (no Ceph)
  storage: pvc

  # Filesystem storage configuration for Glance
  conf:
    ceph:
      enabled: false
    glance:
      glance_store:
        default_backend: file
        enabled_backends: "file:file,http:http"
        filesystem_store_datadir: /var/lib/glance/images
      DEFAULT:
        enabled_backends: "file:file,http:http"

  # PVC volume for image storage
  volume:
    class_name: ceph-block
    size: 20Gi

  # Disable Ceph secrets
  secrets:
    rbd: ""

  # Disable Ceph client
  ceph_client:
    configmap: ""
    user_secret_name: ""

  # Use labels that exist on all nodes for homelab flexibility
  labels:
    api:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    job:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux
    test:
      node_selector_key: kubernetes.io/os
      node_selector_value: linux

  # Endpoints configuration
  endpoints:
    identity:
      auth:
        admin:
          region_name: RegionOne
          username: admin
          password: <your-openstack-admin-password>
          project_name: admin
          user_domain_name: default
          project_domain_name: default
        glance:
          role: admin
          region_name: RegionOne
          username: glance
          password: <your-glance-keystone-password>
          project_name: service
          user_domain_name: service
          project_domain_name: service
      hosts:
        default: keystone
        internal: keystone-api
      host_fqdn_override:
        default: null
      path:
        default: /v3
      scheme:
        default: http
      port:
        api:
          default: 80
          internal: 5000
    image:
      hosts:
        default: glance
        internal: glance-api
      host_fqdn_override:
        default: null
      path:
        default: null
      scheme:
        default: http
      port:
        api:
          default: 9292
          internal: 9292
    oslo_db:
      auth:
        admin:
          username: root
          password: <your-mariadb-root-password>
        glance:
          username: glance
          password: <your-glance-db-password>
      hosts:
        default: openstack-mariadb
      path: /glance
      scheme: mysql+pymysql
      port:
        mysql:
          default: 3306
    oslo_cache:
      hosts:
        default: openstack-memcached
      port:
        memcache:
          default: 11211
    oslo_messaging:
      auth:
        admin:
          username: openstack
          password: <your-rabbitmq-password>
        glance:
          username: openstack
          password: <your-rabbitmq-password>
      hosts:
        default: openstack-rabbitmq
      port:
        amqp:
          default: 5672
      statefulset: null

  # Ingress configuration - use nginx ingress class
  network:
    api:
      ingress:
        public: true
        classes:
          namespace: "nginx"
          cluster: "nginx"

  # Pod configuration
  pod:
    replicas:
      api: 1
    resources:
      api:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"

  # Bootstrap configuration - download Cirros test image
  bootstrap:
    enabled: true
    ks_user: admin
    structured:
      images:
        cirros:
          name: "Cirros 0.6.2 64-bit"
          source_url: "http://download.cirros-cloud.net/0.6.2/"
          image_file: "cirros-0.6.2-x86_64-disk.img"
          min_disk: 1
          image_type: qcow2
          container_format: bare
          private: false

  # Override dependencies to remove rabbit-init (we create vhosts manually)
  dependencies:
    static:
      api:
        jobs:
          - glance-db-sync
          - glance-ks-user
          - glance-ks-endpoints
        services:
          - endpoint: internal
            service: oslo_db
          - endpoint: internal
            service: identity

  # Disable features not needed for homelab
  manifests:
    pod_rally_test: false
    job_image_repo_sync: false
    job_rabbit_init: false
    # Enable storage init for PVC
    job_storage_init: true
