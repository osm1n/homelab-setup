# KubeVirt Custom Resource - configures KubeVirt installation
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  configuration:
    developerConfiguration:
      featureGates:
        - LiveMigration
        - Snapshot
        - HotplugVolumes
        - ExpandDisks
        - VMExport
    smbios:
      sku: "TalosCloud"
      manufacturer: "Talos Virtualization"
      product: "talosvm"
    # Use Ceph for VM storage
    vmStateStorageClass: ceph-block
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate
  certificateRotateStrategy: {}
  imagePullPolicy: IfNotPresent
